spring:
  application:
    name: petshop-agent

  # ==========================================
  # MySQL Configuration
  # ==========================================
  datasource:
    url: jdbc:mysql://localhost:3306/petshop_agent?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  # ==========================================
  # Flyway Migrations
  # ==========================================
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ==========================================
  # Spring AI - Gemini via OpenAI-compatible API
  # Basta gerar uma API Key em: https://aistudio.google.com/apikey
  # ==========================================
  ai:
    openai:
      api-key: AIzaSyAaZ7YWrCVByvVT8e7BOafNTjl6zmihCxs
      base-url: https://generativelanguage.googleapis.com/v1beta/openai
      chat:
        options:
          model: gemini-2.5-flash
          temperature: 0.7

          #email: agent-calendar@teste-agente-ia-490205.iam.gserviceaccount.com

# ==========================================
# Server Configuration
# ==========================================
server:
  port: 8080

# ==========================================
# Logging
# ==========================================
logging:
  level:
    com.mentoriatech.agent: DEBUG
    org.springframework.ai: DEBUG
